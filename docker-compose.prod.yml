version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_API_URL=${FRONTEND_API_URL}
        - REACT_APP_BACKEND_URL=${FRONTEND_BACKEND_URL}
        - REACT_APP_INFRA=${APP_INFRA:-JIO}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - video-mom-backend
    restart: unless-stopped
    networks:
      - egramsabha-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # expose port internally only (not to the host/internet)
    expose:
      - "5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/voter_registration}
      - USE_DOCUMENTDB=${USE_DOCUMENTDB:-false}
      - NODE_ENV=production
      - CORS_ORIGIN=${CORS_ORIGIN}
      - BACKEND_URL=${BACKEND_URL}
      - VIDEO_MOM_BACKEND_URL=http://video-mom-backend:8000
      - JIOMEET_API=${JIOMEET_API}
      - JIOMEET_APP_ID=${JIOMEET_APP_ID}
      - PRIVATE_KEY_PATH=${PRIVATE_KEY_PATH:-./keys/RSA-PrivateKey.pem}
      - PUBLIC_KEY_PATH=${PUBLIC_KEY_PATH:-./keys/RSA-PublicKey.pub}
      - SUPPORT_EMAIL=${SUPPORT_EMAIL}
      - SUPPORT_PHONE=${SUPPORT_PHONE}
      - SUPPORT_CONTACT_NAME=${SUPPORT_CONTACT_NAME}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-gridfs}
      - S3_BUCKET=${S3_BUCKET:-egramsabha-assets}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - JWT_ADMIN_SECRET=${JWT_ADMIN_SECRET}
      - JWT_OFFICIAL_SECRET=${JWT_OFFICIAL_SECRET}
      - JWT_CITIZEN_SECRET=${JWT_CITIZEN_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SECRETS_MANAGER_SECRET_NAME=${SECRETS_MANAGER_SECRET_NAME:-egramsabha/prod}
      - FACE_VERIFICATION_PROVIDER=${FACE_VERIFICATION_PROVIDER:-local}
      - SNS_ENABLED=${SNS_ENABLED:-false}
      - CLOUDWATCH_LOG_GROUP=${CLOUDWATCH_LOG_GROUP:-/egramsabha/backend}
      - AGENDA_TRANSLATION_CRON=${AGENDA_TRANSLATION_CRON:-*/5 * * * *}
      - INITIATE_SUMMARY_CRON=${INITIATE_SUMMARY_CRON:-*/5 * * * *}
      - FETCH_SUMMARY_RESULTS_CRON=${FETCH_SUMMARY_RESULTS_CRON:-*/5 * * * *}
      - RETRY_FAILED_SUMMARY_CRON=${RETRY_FAILED_SUMMARY_CRON:-*/10 * * * *}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - egramsabha-net

  video-mom-backend:
    build:
      context: ./video-mom-backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment:
      - JIO_API_KEY=${JIO_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - STT_MODEL_ENDPOINT=${STT_MODEL_ENDPOINT}
      - HUGGING_FACE_LLM_ENDPOINT=${HUGGING_FACE_LLM_ENDPOINT}
      - HF_LLM=${HF_LLM}
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - DATABASE_NAME=${DATABASE_NAME:-voter_registration}
      - USE_DOCUMENTDB=${USE_DOCUMENTDB:-false}
      - STT_PROVIDER=${STT_PROVIDER:-aws_transcribe}
      - AWS_TRANSCRIBE_BUCKET=${AWS_TRANSCRIBE_BUCKET:-egramsabha-transcribe-temp}
      - LLM_PROVIDER=${LLM_PROVIDER:-bedrock}
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-aws_translate}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-amazon.nova-lite-v1:0}
      - BEDROCK_MAX_TOKENS=${BEDROCK_MAX_TOKENS:-4096}
      - S3_BUCKET=${S3_BUCKET:-egramsabha-assets}
      - CLOUDWATCH_LOG_GROUP=${CLOUDWATCH_LOG_GROUP:-/egramsabha/video-mom}
      - COMPREHEND_ENABLED=${COMPREHEND_ENABLED:-true}
      - TTS_PROVIDER=${TTS_PROVIDER:-polly}
      - API_GATEWAY_API_KEY=${API_GATEWAY_API_KEY:-}
    volumes:
      - video_mom_temp_storage:/app/temp_storage
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - egramsabha-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mongodb:
    image: mongo:7
    # internal only — NOT exposed to the internet
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - egramsabha-net
    command: ["mongod", "--quiet"]

networks:
  egramsabha-net:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local
  video_mom_temp_storage:
    driver: local
